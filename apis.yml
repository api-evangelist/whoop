aid: whoop
name: WHOOP
description: >-
  WHOOP is a fitness and recovery wearable platform providing a REST API for
  accessing sleep, recovery, strain, and workout metrics from the WHOOP band.
  The API uses OAuth 2.0 authorization code flow with Bearer tokens to allow
  developers to build applications that access member health and performance
  data including physiological cycles, sleep stages, recovery scores, strain,
  heart rate, body measurements, and workout records.
